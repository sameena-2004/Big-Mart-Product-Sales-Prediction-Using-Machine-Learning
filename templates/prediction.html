<!DOCTYPE html>
<html>

<head>

<title>Product Demand Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

/* Container */

.container{
background:white;
padding:35px;
border-radius:12px;
width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

/* Title */

h1{
margin-bottom:20px;
color:#333;
}

/* Labels */

label{
display:block;
text-align:left;
margin-top:10px;
font-weight:500;
color:#444;
}

/* Inputs */

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
transition:0.2s;
}

input:focus{
border-color:#667eea;
outline:none;
box-shadow:0 0 5px rgba(102,126,234,0.4);
}

/* Button */

button{
width:100%;
margin-top:18px;
padding:12px;
border:none;
border-radius:6px;
background:linear-gradient(45deg,#36d1dc,#5b86e5);
color:white;
font-size:16px;
font-weight:500;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* Prediction result */

.result{
margin-top:20px;
font-size:18px;
font-weight:600;
color:#27ae60;
}

/* Back button */

.back{
display:inline-block;
margin-top:20px;
text-decoration:none;
color:white;
background:#2c3e50;
padding:8px 15px;
border-radius:6px;
font-size:14px;
}

.back:hover{
background:#34495e;
}

</style>

</head>

<body>

<div class="container">

<h1>Product Demand Prediction</h1>

<form action="/predict" method="POST">

<label>Product Name</label>
<input type="text" name="name" placeholder="Enter product name" required>

<label>Category</label>
<input type="text" name="category" placeholder="Example: snacks, dairy, grocery" required>

<label>Price (₹)</label>
<input type="number" step="any" name="price" required>

<label>Current Stock</label>
<input type="number" name="stock" required>

<button type="submit">Predict Demand</button>

</form>

{% if prediction_text %}
<div class="result">
{{prediction_text}}
</div>
{% endif %}

<a class="back" href="/dashboard">Back</a>

</div>

</body>
</html>
