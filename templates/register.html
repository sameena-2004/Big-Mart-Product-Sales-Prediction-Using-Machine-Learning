<!DOCTYPE html>
<html>

<head>

<title>Retail Shop Registration</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(120deg,#1d2671,#c33764);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

/* Registration container */

.register-box{
background:white;
padding:40px;
border-radius:12px;
width:380px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
text-align:center;
animation:fadeIn 0.8s ease;
}

/* Title */

h2{
margin-bottom:20px;
color:#1d2671;
}

/* Labels */

label{
display:block;
text-align:left;
font-size:14px;
margin-top:10px;
color:#444;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
transition:0.2s;
}

input:focus{
border-color:#2874f0;
outline:none;
box-shadow:0 0 5px rgba(40,116,240,0.3);
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:18px;
background:#2874f0;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

button:hover{
background:#0f5ad6;
transform:translateY(-1px);
}

/* Back link */

.back-link{
display:block;
margin-top:18px;
text-decoration:none;
color:#2874f0;
font-weight:600;
}

.back-link:hover{
text-decoration:underline;
}

/* Animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Mobile responsive */

@media(max-width:420px){

.register-box{
width:90%;
padding:30px;
}

}

</style>

</head>

<body>

<div class="register-box">

<h2>Retail Shop Registration</h2>

<form method="POST">

<label>Username</label>
<input type="text" name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<label>Shop Name</label>
<input type="text" name="shop_name" required>

<label>Shop Location</label>
<input type="text" name="shop_location" required>

<button type="submit">Register</button>

</form>

<a class="back-link" href="/">Back to Login</a>

</div>

</body>

</html>
