<!DOCTYPE html>
<html>

<head>

<title>Demand Forecast</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

.container{
width:80%;
margin:auto;
}

table{
width:80%;
margin:auto;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#3498db;
color:white;
}

h1{
margin-top:20px;
}

canvas{
margin:40px auto;
}

button{
padding:10px 15px;
background:#27ae60;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1e8449;
}

</style>

</head>

<body>

<div class="container">

<h1>📈 Product Demand Forecast</h1>

<canvas id="forecastChart" height="120"></canvas>

<table>

<tr>
<th>Product</th>
<th>Current Stock</th>
<th>Predicted Demand</th>
<th>Restock Recommendation</th>
</tr>

{% for p in forecast_results %}

<tr>
<td>{{p.name}}</td>
<td>{{p.stock}}</td>
<td>{{p.demand}}</td>
<td>{{p.restock}}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">
<button>Back to Dashboard</button>
</a>

</div>

<script>

const labels = JSON.parse('{{ forecast_results | map(attribute="name") | list | tojson | safe }}');
const demand = JSON.parse('{{ forecast_results | map(attribute="demand") | list | tojson | safe }}');

const ctx = document.getElementById('forecastChart');

new Chart(ctx, {
type: 'bar',
data: {
labels: labels,
datasets: [{
label: 'Predicted Demand',
data: demand,
backgroundColor: '#2874f0'
}]
},
options: {
responsive:true,
plugins:{
legend:{
display:true
}
}
}
});

</script>

</body>

</html>
