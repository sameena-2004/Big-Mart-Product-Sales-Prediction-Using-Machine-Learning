<!DOCTYPE html>
<html>
<head>
    <title>Retail Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .chart-box {
            background: white;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
        }

        canvas {
            max-width: 100%;
        }

        .back {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 18px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .back:hover {
            background: #34495e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Retail Sales Analytics</h1>

        <div class="chart-box">
            <h2>Top Selling Categories</h2>
            <canvas id="chart1"></canvas>
        </div>

        <div class="chart-box">
            <h2>Top 10 Product Categories by Sales</h2>
            <canvas id="chart2"></canvas>
        </div>

        <div class="chart-box">
            <h2>Category Distribution</h2>
            <canvas id="chart3"></canvas>
        </div>

        <script type="application/json" id="chartData">
            {
                "labels": {{ labels | tojson }},
                "values": {{ values | tojson }},
                "top10_labels": {{ top10_labels | tojson }},
                "top10_values": {{ top10_values | tojson }}
            }
        </script>

        <script>
            const chartData = JSON.parse(document.getElementById('chartData').textContent);
            const labels = chartData.labels;
            const values = chartData.values;
            const top10_labels = chartData.top10_labels;
            const top10_values = chartData.top10_values;

            /* Chart 1 - Bar Chart */
            const ctx1 = document.getElementById("chart1").getContext("2d");
            new Chart(ctx1, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Total Sales",
                        data: values,
                        backgroundColor: [
                            "#4CAF50",
                            "#2196F3",
                            "#FF9800",
                            "#9C27B0",
                            "#00BCD4",
                            "#FF5722"
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });

            /* Chart 2 - Horizontal Bar */
            const ctx2 = document.getElementById("chart2").getContext("2d");
            new Chart(ctx2, {
                type: "bar",
                data: {
                    labels: top10_labels,
                    datasets: [{
                        label: "Sales",
                        data: top10_values,
                        backgroundColor: "#36A2EB"
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true
                }
            });

            /* Chart 3 - Pie Chart */
            const ctx3 = document.getElementById("chart3").getContext("2d");
            new Chart(ctx3, {
                type: "pie",
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: [
                            "#FF6384",
                            "#36A2EB",
                            "#FFCE56",
                            "#4BC0C0",
                            "#9966FF",
                            "#FF9F40"
                        ]
                    }]
                }
            });
        </script>

        <br>
        <a class="back" href="/dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
